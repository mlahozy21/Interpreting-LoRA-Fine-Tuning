name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (CPU torch; the probes are tested on a synthetic LoRA module)
        run: |
          pip install "torch>=2.2" --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pytest
      - name: Run tests
        run: pytest tests/ -q
